name: Generate resume PDF

on:
  push:
    branches: [main]
    paths: [index.md]
  workflow_dispatch:

concurrency:
  group: resume-pdf
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Wait for this revision to reach GitHub Pages
        env:
          RESUME_URL: https://wilkesybear.github.io/
          REVISION: ${{ github.sha }}
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error "$RESUME_URL" \
              | grep --fixed-strings --quiet "data-revision=\"$REVISION\""; then
              exit 0
            fi
            sleep 5
          done

          echo "Timed out waiting for GitHub Pages to deploy revision $REVISION" >&2
          exit 1

      - name: Print the live resume to PDF
        env:
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          RESUME_URL: https://wilkesybear.github.io/
        run: |
          "$CHROME_PATH" \
            --headless \
            --disable-gpu \
            --no-sandbox \
            --no-pdf-header-footer \
            --print-to-pdf="$GITHUB_WORKSPACE/Andrew-Wilkes-Resume.pdf" \
            "$RESUME_URL"

          test -s Andrew-Wilkes-Resume.pdf

      - name: Commit the refreshed PDF
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update resume PDF [skip ci]"
          file_pattern: Andrew-Wilkes-Resume.pdf
